---
# Clickable build configuration
# https://clickable-ut.dev

build_dir: build
install_dir: install

# Pure QML app — no C++ compilation needed
build: pure-qml-cmake

# App identifier — change "yourname" to your OpenStore username
app_id: callscreener.yourname

# Source files to install into the click
install:
  - qml
  - assets

# Run on device with: clickable run
run_args: []
